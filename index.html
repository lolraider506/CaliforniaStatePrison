<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>California State Prison</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#0b0b0b;color:#eaeaea;overflow-x:hidden}
.container{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
h1{font-size:3rem;font-weight:700;letter-spacing:1px}
.subtitle{color:#9a9a9a;margin-top:10px;font-size:1.1rem}
.buttons{margin-top:30px;display:flex;gap:15px;flex-wrap:wrap;justify-content:center}
.btn{background:#151515;border:1px solid #2a2a2a;color:#fff;padding:12px 22px;border-radius:10px;cursor:pointer;transition:.25s;font-size:15px}
.btn:hover{background:#262626;transform:translateY(-3px) scale(1.05)}
.section{padding:80px 20px;text-align:center}
.section h2{font-size:2rem;margin-bottom:10px}
.team{display:flex;flex-wrap:wrap;justify-content:center;gap:25px;margin-top:30px}
.card{background:#121212;border:1px solid #2a2a2a;border-radius:14px;padding:25px;width:260px;transition:.3s}
.card:hover{transform:translateY(-6px) scale(1.03);border-color:#3a3a3a}
.name{font-weight:600;font-size:1.2rem;margin-bottom:6px}
.role{color:#888;font-size:0.9rem;margin-bottom:10px}
.link{color:#bdbdbd;font-size:0.9rem;text-decoration:none;display:block;margin-top:5px}
.link:hover{color:#fff}
.fade{opacity:0;transform:translateY(30px);transition:1s}
.show{opacity:1;transform:translateY(0)}
.cursor{display:inline-block;width:2px;height:1em;background:#fff;margin-left:4px;animation:blink .7s infinite}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>

<div class="container">
<h1 id="title"></h1>
<div class="subtitle" id="subtitle"></div>

<div class="buttons">
<button class="btn" onclick="window.open('https://www.roblox.com/communities/33888997/California-State-Prison#!/about')">Join Roblox Group</button>
<button class="btn">Game (Coming Soon)</button>
<button class="btn" onclick="window.open('https://discord.gg/MYC3KuNtdq')">Join Discord</button>
</div>
</div>

<div class="section fade">
<h2>Meet the Team</h2>
<div class="team">

<div class="card">
<div class="name">mhzbaby1199193</div>
<div class="role">Owner</div>
<a class="link" href="https://www.roblox.com/users/2767974107/profile" target="_blank">MhzBaby4047</a>
</div>

<div class="card">
<div class="name">joshua_neww</div>
<div class="role">Lead Developer</div>
<a class="link" href="https://www.roblox.com/users/3745240218/profile" target="_blank">markthebark2116</a>
</div>

</div>
</div>

<script>
const titleText="California State Prison";
const subText="Official Information Page";
let i=0,j=0;

function typeTitle(){
if(i<titleText.length){
document.getElementById("title").innerHTML+=titleText.charAt(i);
i++;
setTimeout(typeTitle,25);
}else{
document.getElementById("title").innerHTML+='<span class="cursor"></span>';
typeSub();
}
}

function typeSub(){
if(j<subText.length){
document.getElementById("subtitle").innerHTML+=subText.charAt(j);
j++;
setTimeout(typeSub,20);
}
}

typeTitle();

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
});

document.querySelectorAll(".fade").forEach(el=>observer.observe(el));
</script>

</body>
</html>
